name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write  # for PyPI OIDC publish (trusted publisher)

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for changelog extraction
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${v}" >> "${GITHUB_OUTPUT}"
          echo "Releasing ${v}"
      - name: Verify _version.py matches tag
        run: |
          py_v="$(python -c 'from cmaxctl._version import __version__; print(__version__)')"
          tag_v="${{ steps.ver.outputs.version }}"
          if [[ "${py_v}" != "${tag_v}" ]]; then
            echo "::error::_version.py says ${py_v} but tag is ${tag_v}" >&2
            exit 1
          fi
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify built artefacts
        run: |
          ls -la dist/
          python -c "import zipfile; z = zipfile.ZipFile([f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0] if False else 'dist/' + [f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0]); z.testzip()"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/cmaxctl
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # OIDC trusted publishing — no API token in repo

  github-release:
    name: GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract changelog section for this version
        id: notes
        run: |
          v="${{ needs.build.outputs.version }}"
          # Pull the [v$v] block out of CHANGELOG.md, fall back to a one-liner
          awk -v v="${v}" '
            /^## \[/ { if (in_blk) exit; if ($0 ~ "\\["v"\\]") { in_blk=1; next } }
            in_blk { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "Release ${v}." > /tmp/release-notes.md
          fi
          echo "notes_file=/tmp/release-notes.md" >> "${GITHUB_OUTPUT}"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: cmaxctl ${{ needs.build.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, 'rc') || contains(needs.build.outputs.version, 'a') || contains(needs.build.outputs.version, 'b') }}

  bump-homebrew:
    name: Bump Homebrew formula
    needs: [build, publish-pypi]
    runs-on: ubuntu-24.04
    if: ${{ !contains(needs.build.outputs.version, 'rc') && !contains(needs.build.outputs.version, 'a') && !contains(needs.build.outputs.version, 'b') }}
    steps:
      - name: Trigger formula bump
        # Placeholder — the actual brew bump-formula-pr requires a PAT with
        # write access to the homebrew tap. See docs/COMPATIBILITY.md.
        run: |
          echo "Brew formula bump needs to be triggered manually for v${{ needs.build.outputs.version }}"
          echo "Run: brew bump-formula-pr --version=${{ needs.build.outputs.version }} cmaxctl"
