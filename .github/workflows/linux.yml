name: Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: ${{ matrix.os }} py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint (ruff)
        run: ruff check ccpool tests
      - name: Run unit + integration (no-binary) tests
        # The libsecret round-trip self-skips unless CCPOOL_TEST_LINUX_KEYRING=1.
        run: pytest tests/unit tests/integration -v

  identity-scrub:
    name: identity-scrub gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify no personal identifiers leaked into source
        run: |
          set -euo pipefail
          if grep -rE '(torrinkay|tor1|tor2|amatorri|/Users/)' \
              --include='*.py' --include='*.sh' --include='*.toml' \
              --include='*.md' --include=ccpool \
              . \
              | grep -vE '(tests/fixtures|ccpool/migrate.py|CHANGELOG\.md|/__pycache__/|\.git/)'
          then
            echo '::error::personal identifier leaked into source'
            exit 1
          fi

  keyring:
    name: linux libsecret round-trip
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install keyring deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-tools gnome-keyring dbus-user-session dbus-x11
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run keyring round-trip under dbus + gnome-keyring
        env:
          CCPOOL_TEST_LINUX_KEYRING: '1'
        run: |
          dbus-run-session -- bash -c '
            eval "$(echo -n "" | gnome-keyring-daemon --unlock)"
            eval "$(echo -n "" | gnome-keyring-daemon --start)"
            export GNOME_KEYRING_CONTROL GNOME_KEYRING_PID SSH_AUTH_SOCK
            pytest tests/integration/test_linux_keyring.py -v
          '

  package:
    name: build sdist + wheel
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
