<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16181a"/>
      <stop offset="1" stop-color="#1d1f21"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ed3a3"/>
      <stop offset="1" stop-color="#a0d8ef"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#2a2d31" stroke-width="1" opacity="0.4">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- accent stripe -->
  <rect x="0" y="0" width="6" height="640" fill="url(#accent)"/>

  <!-- wordmark -->
  <text x="80" y="220" font-family="ui-sans-serif, -apple-system, 'SF Pro Display', system-ui, Inter, sans-serif" font-size="160" font-weight="800" fill="#f5f7fa" letter-spacing="-4">ccpool</text>

  <!-- subtitle -->
  <text x="84" y="290" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="32" fill="#a8b0b9" font-weight="400">account-rotation wrapper for Anthropic's <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#e6e8eb">claude</tspan> CLI</text>

  <!-- second subtitle line -->
  <text x="84" y="338" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="26" fill="#7c8794" font-weight="400">pools Pro, Max, and Team subscriptions; picks per call by real-time usage</text>

  <!-- terminal preview card -->
  <g transform="translate(80, 410)">
    <rect x="0" y="0" width="1120" height="170" rx="14" fill="#0f1113" stroke="#2a2d31" stroke-width="1"/>
    <rect x="0" y="0" width="1120" height="34" rx="14" fill="#23262a"/>
    <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="17" r="6" fill="#febc2e"/>
    <circle cx="66" cy="17" r="6" fill="#28c840"/>
    <text x="560" y="22" text-anchor="middle" fill="#7c8794" font-family="ui-monospace, monospace" font-size="13">~/projects/api</text>

    <text x="32" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#7c8794">$</text>
    <text x="60" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#e6e8eb">ccpool statusline --short</text>

    <circle cx="44" cy="124" r="11" fill="#7ed3a3" filter="url(#glow)"/>
    <text x="68" y="131" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#e6e8eb">personal 42% / 71%</text>
  </g>

  <!-- footer tags -->
  <g transform="translate(80, 600)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#7c8794">
    <text x="0" y="0">MIT</text>
    <text x="80" y="0">·</text>
    <text x="100" y="0">macOS · Linux</text>
    <text x="320" y="0">·</text>
    <text x="340" y="0">Homebrew · pipx</text>
    <text x="600" y="0">·</text>
    <text x="620" y="0">github.com/torkay/ccpool</text>
  </g>
</svg>
